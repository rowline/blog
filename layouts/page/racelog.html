{{ define "main" }}
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="/racelog/races.js"></script>

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Protect global Hugo Header from Tailwind Preflight Bleed */
        nav .text-gray-500, nav .dark\:text-gray-200, 
        .main-menu a.text-2xl, .main-menu p,
        .main-menu .text-gray-500, .main-menu .dark\:text-gray-200,
        header .text-gray-500, header .dark\:text-gray-200,
        .main-menu a, a.flex p {
            color: inherit !important;
        }
        
        body { 
            background-color: transparent !important; 
        }
    </style>

    <div id="root">
        <div class="loading">
            <div class="text-center">
                <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-teal-500"></div>
                <div class="text-lg text-gray-600 mt-4">Loading Race Log...</div>
            </div>
        </div>
    </div>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <!-- Babel Standalone for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" src="/racelog/app.js"></script>
{{ end }}
