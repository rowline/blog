{{ define "main" }}
    <!-- Inject CSS assets generated by Vite -->
    {{ range site.Data.sports_assets.css }}
        <link rel="stylesheet" href="{{ . }}">
    {{ end }}
    
    <style>
        /* Protect global Hugo Header from Tailwind Preflight Bleed */
        nav .text-gray-500, nav .dark\:text-gray-200, 
        .main-menu a.text-2xl, .main-menu p,
        .main-menu .text-gray-500, .main-menu .dark\:text-gray-200,
        header .text-gray-500, header .dark\:text-gray-200,
        .main-menu a, a.flex p {
            color: inherit !important;
        }
        
        body { 
            background-color: transparent !important; 
        }
    </style>

    
    <!-- React App Mount Point -->
    <div id="root"></div>
    
    <!-- Inject JS assets generated by Vite -->
    {{ range site.Data.sports_assets.js }}
        <script type="module" crossorigin src="{{ . }}"></script>
    {{ end }}
{{ end }}
